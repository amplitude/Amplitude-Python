name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:

jobs:
  authorize:
    name: Authorize
    runs-on: ubuntu-latest
    steps:
      - name: ${{ github.actor }} permission check to do a release
        uses: "lannonbr/repo-permission-check-action@2.0.2"
        with:
          permission: "write"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-n-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    needs: [authorize]
    permissions:
      id-token: write
    steps:
      - name: Checkout for release to PyPI
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python 3.9
        uses: actions/setup-python@v3
        with:
          python-version: 3.9

      - name: Run Test
        run: python -m unittest discover -s ./src -p 'test_*.py'

      - name: Publish distribution to VCS (dry run)
        run: |
          python -m pip install "python-semantic-release>=10,<11"
          semantic-release --noop -vv version --no-commit --no-tag --no-push

      - name: Publish distribution Test PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e
        with:
          repository_url: https://test.pypi.org/legacy/
